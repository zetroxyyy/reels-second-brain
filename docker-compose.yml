version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: rsb-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: rsb-worker
    depends_on:
      - ollama
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./worker/cookies.txt:/app/cookies.txt
    restart: always

volumes:
  ollama_storage:
